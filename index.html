<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calc MACRO v2.0</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --negro:    #000000;
      --fondo:    #050508;
      --panel:    #0a0a14;
      --cyan:     #00e5ff;
      --violet:   #7b00ff;
      --rojo:     #ff2d6b;
      --texto:    #ccd6f6;
      --muted:    #8892b0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--negro);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
    }

    .calc-card {
      background: var(--fondo);
      border: 1px solid var(--cyan);
      border-radius: 4px;
      padding: 22px;
      width: 340px;
      position: relative;
    }

    .calc-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 4px;
      border: 1px solid rgba(123, 0, 255, 0.27);
      pointer-events: none;
    }

    .calc-header {
      font-family: 'Share Tech Mono', monospace;
      color: var(--cyan);
      font-size: 0.65rem;
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0, 229, 255, 0.2);
    }

    .display-box {
      background: #000;
      border: 1px solid rgba(0, 229, 255, 0.33);
      border-radius: 2px;
      padding: 14px 16px;
      margin-bottom: 18px;
      text-align: right;
      position: relative;
    }

    .display-box::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: var(--cyan);
      opacity: 0.4;
    }

    #expresion {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--violet);
      min-height: 18px;
      letter-spacing: 1px;
    }

    #pantalla {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2.2rem;
      color: var(--cyan);
      word-break: break-all;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .grid-teclado {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .btn-calc {
      height: 52px;
      border: 1px solid #1a1a2e;
      border-radius: 2px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.08s;
      letter-spacing: 1px;
      background: var(--panel);
      color: var(--muted);
    }

    .btn-calc:active { transform: scale(0.94); }

    .btn-num {
      background: #0d0d1a;
      color: var(--texto);
      border-color: #1e2050;
    }
    .btn-num:hover { background: #141428; border-color: rgba(0,229,255,0.33); color: var(--cyan); }

    .btn-op {
      background: #060612;
      color: var(--cyan);
      border-color: rgba(0,229,255,0.27);
    }
    .btn-op:hover { background: #0a1520; border-color: var(--cyan); }

    .btn-c {
      background: #140006;
      color: var(--rojo);
      border-color: rgba(255,45,107,0.27);
    }
    .btn-c:hover { background: #1f000d; border-color: var(--rojo); }

    .btn-igual {
      grid-column: span 2;
      background: var(--cyan);
      color: #000;
      border-color: var(--cyan);
      font-size: 1.3rem;
    }
    .btn-igual:hover { background: #00bfdd; }

    .btn-fn {
      height: 44px;
      background: #08001a;
      color: #bf80ff;
      border-color: rgba(123,0,255,0.27);
      font-size: 0.7rem;
      letter-spacing: 0.5px;
    }
    .btn-fn:hover { background: #110028; border-color: var(--violet); color: #d4aaff; }

    .span2 { grid-column: span 2; }

    .fn-label {
      grid-column: span 4;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: rgba(0,229,255,0.4);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 6px;
      padding-top: 8px;
      border-top: 1px solid rgba(0,229,255,0.1);
    }

    .calc-footer {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: #1a3040;
      text-align: center;
      margin-top: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="calc-card">
    <div class="calc-header">// CALC_MACRO &mdash; SYS_V2.0 //</div>

    <div class="display-box">
      <div id="expresion">&nbsp;</div>
      <div id="pantalla">0</div>
    </div>

    <div class="grid-teclado">

      <button class="btn-calc btn-c" onclick="limpiar()">CLR</button>
      <button class="btn-calc btn-op" onclick="borrar()">DEL</button>
      <button class="btn-calc btn-op" onclick="setOp('%')">MOD</button>
      <button class="btn-calc btn-op" onclick="setOp('/')">&divide;</button>

      <button class="btn-calc btn-num" onclick="num('7')">7</button>
      <button class="btn-calc btn-num" onclick="num('8')">8</button>
      <button class="btn-calc btn-num" onclick="num('9')">9</button>
      <button class="btn-calc btn-op" onclick="setOp('*')">&times;</button>

      <button class="btn-calc btn-num" onclick="num('4')">4</button>
      <button class="btn-calc btn-num" onclick="num('5')">5</button>
      <button class="btn-calc btn-num" onclick="num('6')">6</button>
      <button class="btn-calc btn-op" onclick="setOp('-')">&minus;</button>

      <button class="btn-calc btn-num" onclick="num('1')">1</button>
      <button class="btn-calc btn-num" onclick="num('2')">2</button>
      <button class="btn-calc btn-num" onclick="num('3')">3</button>
      <button class="btn-calc btn-op" onclick="setOp('+')">+</button>

      <button class="btn-calc btn-num span2" onclick="num('0')">0</button>
      <button class="btn-calc btn-num" onclick="punto()">.</button>
      <button class="btn-calc btn-igual" onclick="igual()">=</button>

      <div class="fn-label">— funciones avanzadas —</div>

      <button class="btn-calc btn-fn span2" onclick="raizCuadrada()">&#8730; RAIZ CUADRADA</button>
      <button class="btn-calc btn-fn span2" onclick="potencia()">X&#178; POTENCIA</button>

      <button class="btn-calc btn-fn span2" onclick="logaritmo()">LOG BASE 10</button>
      <button class="btn-calc btn-fn span2" onclick="esPrimo()">PRIMO ?</button>

    </div>

    <div class="calc-footer">// interfaz protegida &mdash; sin blanco //</div>
  </div>

  <script>
    let a = '', b = '', op = '', reset = false;
    const scr  = document.getElementById('pantalla');
    const expr = document.getElementById('expresion');

    function render() {
      scr.innerText  = (op === '' ? a : b) || '0';
      expr.innerText = op === '' ? '\u00a0' : `${a} ${op} ${b}`;
    }

    function num(n) {
      if (reset) { a = ''; b = ''; op = ''; reset = false; }
      if (op === '') a += n; else b += n;
      render();
    }

    function punto() {
      if (op === '') { if (!a.includes('.')) a += (a === '' ? '0.' : '.'); }
      else           { if (!b.includes('.')) b += (b === '' ? '0.' : '.'); }
      render();
    }

    function setOp(o) {
      if (a === '') a = '0';
      if (b !== '') igual();
      op = o; reset = false;
      render();
    }

    function igual() {
      if (a === '' || b === '' || op === '') return;
      let n1 = parseFloat(a), n2 = parseFloat(b), res = 0;
      switch (op) {
        case '+': res = n1 + n2; break;
        case '-': res = n1 - n2; break;
        case '*': res = n1 * n2; break;
        case '/': res = n2 !== 0 ? n1 / n2 : 'ERROR_DIV0'; break;
        case '%': res = n1 % n2; break;
      }
      a = String(typeof res === 'number' ? parseFloat(res.toFixed(10)) : res);
      b = ''; op = ''; reset = true;
      render();
    }

    function limpiar() { a = ''; b = ''; op = ''; reset = false; render(); }

    function borrar() {
      if (op === '') a = a.slice(0, -1); else b = b.slice(0, -1);
      render();
    }

    function raizCuadrada() {
      let n = parseFloat(scr.innerText);
      if (isNaN(n))  { scr.innerText = 'ERROR';     return; }
      if (n < 0)     { scr.innerText = 'ERROR_NEG'; return; }
      let res = Math.sqrt(n);
      expr.innerText = 'sqrt(' + n + ') =';
      a = String(parseFloat(res.toFixed(10))); b = ''; op = ''; reset = true;
      scr.innerText = a;
    }

    function potencia() {
      let n = parseFloat(scr.innerText);
      if (isNaN(n)) { scr.innerText = 'ERROR'; return; }
      let res = Math.pow(n, 2);
      expr.innerText = '(' + n + ')^2 =';
      a = String(parseFloat(res.toFixed(10))); b = ''; op = ''; reset = true;
      scr.innerText = a;
    }

    function logaritmo() {
      let n = parseFloat(scr.innerText);
      if (isNaN(n) || n <= 0) { scr.innerText = 'ERROR_DOM'; return; }
      let res = Math.log10(n);
      expr.innerText = 'log10(' + n + ') =';
      a = String(parseFloat(res.toFixed(10))); b = ''; op = ''; reset = true;
      scr.innerText = a;
    }

    function esPrimo() {
      let n = parseInt(scr.innerText);
      if (isNaN(n) || n < 2) { expr.innerText = n + ' -> NO ES PRIMO'; return; }
      for (let i = 2; i <= Math.sqrt(n); i++) {
        if (n % i === 0) { expr.innerText = n + ' -> NO ES PRIMO'; return; }
      }
      expr.innerText = n + ' -> ES PRIMO !';
    }
  </script>

</body>
</html>
